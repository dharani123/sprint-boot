# ╔══════════════════════════════════════════════════════════╗
# ║              DEV PROFILE                                 ║
# ║  In-memory H2 DB, verbose SQL logs, H2 console open      ║
# ╚══════════════════════════════════════════════════════════╝

# ── Database: H2 in-memory ───────────────────────────────────
spring.datasource.url=jdbc:h2:file:./data/learnerdb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA: none = Hibernate touches nothing, Flyway owns the schema ────────
spring.jpa.hibernate.ddl-auto=none

# ── Flyway: versioned SQL migrations in db/migration/ ────────────────────
# Scripts named V1__..., V2__..., etc run in order, exactly once each
spring.flyway.locations=classpath:db/migration
spring.flyway.enabled=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── H2 console: browser-based DB inspector ───────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Logging: verbose in dev ───────────────────────────────────
logging.level.org.example=DEBUG
logging.level.org.springframework.web=INFO

# Colored, readable format: timestamp  LEVEL  logger - message
# %highlight = ANSI color per level (ERROR=red, WARN=yellow, INFO=green, DEBUG=cyan)
logging.pattern.console=%d{HH:mm:ss.SSS} %highlight(%-5level) %cyan(%-30logger{25}) - %msg%n

# ── Error responses: show full stack trace in dev ─────────────
server.error.include-stacktrace=always
server.error.include-message=always

# ── JWT: secret key + token lifetime ─────────────────────────
# Secret must be 32+ characters (256 bits) for HMAC-SHA256 signing
app.jwt.secret=quickmart-dev-secret-key-minimum-256-bits-for-hs256-signing
# 86400000 ms = 24 hours — token expires after this, user must log in again
app.jwt.expiration=86400000

# ── Actuator: expose ALL endpoints in dev ─────────────────────
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.info.env.enabled=true
# Custom app info shown at /actuator/info
info.app.name=Spring Boot Learner
info.app.version=1.0.0
info.app.description=Learning Spring Boot step by step
info.app.profile=Development
