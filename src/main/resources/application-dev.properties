# ╔══════════════════════════════════════════════════════════╗
# ║              DEV PROFILE                                 ║
# ║  In-memory H2 DB, verbose SQL logs, H2 console open      ║
# ╚══════════════════════════════════════════════════════════╝

# ── Database: H2 in-memory ───────────────────────────────────
spring.datasource.url=jdbc:h2:mem:learnerdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA: create fresh tables every restart ───────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── H2 console: browser-based DB inspector ───────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Logging: verbose in dev ───────────────────────────────────
logging.level.org.example=DEBUG
logging.level.org.springframework.web=INFO

# Colored, readable format: timestamp  LEVEL  logger - message
# %highlight = ANSI color per level (ERROR=red, WARN=yellow, INFO=green, DEBUG=cyan)
logging.pattern.console=%d{HH:mm:ss.SSS} %highlight(%-5level) %cyan(%-30logger{25}) - %msg%n

# ── Error responses: show full stack trace in dev ─────────────
server.error.include-stacktrace=always
server.error.include-message=always

# ── Actuator: expose ALL endpoints in dev ─────────────────────
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.info.env.enabled=true
# Custom app info shown at /actuator/info
info.app.name=Spring Boot Learner
info.app.version=1.0.0
info.app.description=Learning Spring Boot step by step
info.app.profile=Development
