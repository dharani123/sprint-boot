# ╔══════════════════════════════════════════════════════════╗
# ║              PROD PROFILE                                ║
# ║  Real DB, no SQL logs, no debug tools exposed            ║
# ╚══════════════════════════════════════════════════════════╝

# ── Database: real PostgreSQL (replace with your actual URL) ─
spring.datasource.url=jdbc:postgresql://prod-db-server:5432/learnerdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ── JPA: none = Flyway owns the schema ───────────────────────
spring.jpa.hibernate.ddl-auto=none

# ── Flyway ───────────────────────────────────────────────────
spring.flyway.locations=classpath:db/migration
spring.flyway.enabled=true
spring.jpa.show-sql=false

# ── H2 console: NEVER expose in prod ─────────────────────────
spring.h2.console.enabled=false

# ── Logging: only warnings and errors ────────────────────────
logging.level.org.example=WARN
logging.level.org.springframework=WARN

# ── Error responses: hide internals from users ────────────────
server.error.include-stacktrace=never
server.error.include-message=never

# ── JWT: loaded from environment variables in prod (never hardcode secrets!) ─
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ── Actuator: only expose health in prod (never expose beans/env — security risk!) ──
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
